<head>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/contact.css">
</head>

<body>

<header>
    <nav class="navbar">
        <a href="index.html" class="logo">PawHaven</a>
        <button class="hamburger">
            <span></span>
            <span></span>

            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="contact.html" class="btn-adopt">Adopt Now</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <div class="form-box" id="formBox">
        <h2>Adoption Registration</h2>
        <form id="adoptForm">
            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email Address">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="text" id="address" placeholder="Address">
            <input type="text" id="pet" placeholder="Pet Preference">
            <textarea id="message" placeholder="Message"></textarea>
            <p id="error"></p>
            <button type="submit" class="btn btn-primary">Submit Application</button>
        </form>
    </div>

    <div class="info-box" id="thankBox">
        <div class="check">&#10003;</div>
        <h1>Thank You</h1>
        <p>Your application has been<br>submitted successfully.</p>
    </div>

</div>

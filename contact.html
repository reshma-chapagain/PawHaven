<div class="container">



<!-- LEFT FORM -->

<div class="form-box" id="formBox">


<h2>Adoption Registration</h2>



<form id="adoptForm">



<label>Full Name</label>

<input type="text" id="name">

<span class="error" id="nameError"></span>





<label>Email</label>

<input type="email" id="email">

<span class="error" id="emailError"></span>





<label>Phone Number</label>

<input type="text" id="phone">

<span class="error" id="phoneError"></span>





<label>Address</label>

<input type="text" id="address">

<span class="error" id="addressError"></span>





<label>Pet Preference</label>

<input type="text" id="pet">

<span class="error" id="petError"></span>





<label>Adoption Appointment Date</label>

<input type="text" id="date" placeholder="Select Date">


<span class="error" id="dateError"></span>





<label>Message</label>

<textarea id="message"></textarea>

<span class="error" id="messageError"></span>





<button type="submit">

Submit Application

</button>



</form>



</div>









<!-- THANK YOU PANEL -->


<div class="info-box" id="thankBox">



<div class="check">

&check;

</div>


<h1>

Thank You

</h1>


<p>

Your adoption application<br>

has been submitted successfully.

</p>



</div>

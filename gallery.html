<!DOCTYPE html>
<html>
<head>
    <title>Pet Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <header>
        <h1>🐾 Pawfect Adoption Center</h1>
    </header>

    <div class="buttons">
        <button>All</button>
        <button>Dogs</button>
        <button>Cats</button>
    </div>

    <div class="gallery">

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Dog">
            <h3>Bruno</h3>
            <p>2 Years • Dog</p>
        </div>

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Cat">
            <h3>Chloe</h3>
            <p>1 Year • Cat</p>
        </div>

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Dog">
            <h3>Max</h3>
            <p>3 Years • Dog</p>
        </div>

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Cat">
            <h3>Lucy</h3>
            <p>2 Years • Cat</p>
        </div>

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Dog">
            <h3>Charlie</h3>
            <p>4 Years • Dog</p>
        </div>

        <div class="card">
            <img src="images/dog-sample.jpg" alt="Cat">
            <h3>Misty</h3>
            <p>1 Year • Cat</p>
        </div>

    </div>

    <footer>
        <p>© 2026 Pawfect Adoption Center</p>
    </footer>

</body>
</html>
